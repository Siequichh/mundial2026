<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="100%" height="100%">
  <defs>
    <!-- Tri-Host Gradient Rim -->
    <linearGradient id="triHostGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#006847" />   <!-- Mexico Green -->
      <stop offset="35%" stop-color="#0A3161" />  <!-- USA Blue -->
      <stop offset="65%" stop-color="#B31942" />  <!-- USA Red -->
      <stop offset="100%" stop-color="#D80621" /> <!-- Canada Red -->
    </linearGradient>

    <!-- Gold Trophy / Ball Accent -->
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFDF00" />
      <stop offset="50%" stop-color="#D4AF37" />
      <stop offset="100%" stop-color="#996515" />
    </linearGradient>

    <!-- Stadium Glow -->
    <radialGradient id="stadiumGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#182822" />
      <stop offset="100%" stop-color="#0b1210" />
    </radialGradient>
  </defs>

  <!-- Background Shield / Stadium Circle -->
  <rect x="2" y="2" width="60" height="60" rx="18" fill="url(#stadiumGlow)" stroke="url(#triHostGradient)" stroke-width="3.5" />

  <!-- Dynamic Tri-Host Top Stripe -->
  <path d="M 12 12 L 25 12 L 21 16 L 8 16 Z" fill="#006847" />
  <path d="M 27 12 L 40 12 L 36 16 L 23 16 Z" fill="#0A3161" />
  <path d="M 42 12 L 55 12 L 51 16 L 38 16 Z" fill="#D80621" />

  <!-- Stylized Soccer Ball Pentagon & Hexagonal Lines -->
  <g transform="translate(32, 34) scale(0.9)">
    <!-- Central Gold Pentagon -->
    <polygon points="0,-10 9.5,-3 5.8,8 -5.8,8 -9.5,-3" fill="url(#goldGradient)" stroke="#ffffff" stroke-width="1.2" stroke-linejoin="round" />
    
    <!-- Outer Connecting Seams & Panels -->
    <!-- Top -->
    <path d="M 0,-10 L 0,-22 M -12,-22 L 0,-22 L 12,-22" stroke="url(#triHostGradient)" stroke-width="2.5" stroke-linecap="round" fill="none" />
    <!-- Top Right -->
    <path d="M 9.5,-3 L 19,-8 L 24,-1 M 19,-8 L 22,-18" stroke="#ffffff" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.85" />
    <!-- Bottom Right -->
    <path d="M 5.8,8 L 13.5,17 L 8,24 M 13.5,17 L 23,17" stroke="#ffffff" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.85" />
    <!-- Bottom Left -->
    <path d="M -5.8,8 L -13.5,17 L -8,24 M -13.5,17 L -23,17" stroke="#ffffff" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.85" />
    <!-- Top Left -->
    <path d="M -9.5,-3 L -19,-8 L -24,-1 M -19,-8 L -22,-18" stroke="#ffffff" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.85" />
  </g>

  <!-- Number 26 Badge at Bottom -->
  <text x="32" y="56" font-family="'Big Shoulders Display', 'Arial Black', sans-serif" font-weight="900" font-size="15" fill="#ffffff" text-anchor="middle" letter-spacing="1">2026</text>
</svg>